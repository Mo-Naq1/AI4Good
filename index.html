<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Learner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="App controls">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="topbar-actions">
          <button
            class="icon-button"
            id="cameraButton"
            aria-label="Take a picture"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 7h2.2l1.1-1.7h3.4L14.8 7H17a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3Zm5 11a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0-2a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"
              />
            </svg>
          </button>
          <button
            class="icon-button"
            id="uploadButton"
            aria-label="Upload a picture"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 4 7.5 8.5l1.4 1.4 2.1-2.1V16h2V7.8l2.1 2.1 1.4-1.4L12 4Zm-6 13h12v2H6v-2Z"
              />
            </svg>
          </button>
        </div>
      </header>

      <main class="stage">
        <section
          class="empty-state"
          id="emptyState"
          aria-label="Choose image source"
        >
          <div class="hero-orbit" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="choice-row">
            <button
              class="choice-card"
              id="cameraChoice"
              aria-label="Take a picture"
            >
              <div class="choice-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M7 7h2.2l1.1-1.7h3.4L14.8 7H17a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3Zm5 11a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0-2a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"
                  />
                </svg>
              </div>
            </button>
            <button
              class="choice-card"
              id="uploadChoice"
              aria-label="Upload a picture"
            >
              <div class="choice-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 4 7.5 8.5l1.4 1.4 2.1-2.1V16h2V7.8l2.1 2.1 1.4-1.4L12 4Zm-6 13h12v2H6v-2Z"
                  />
                </svg>
              </div>
            </button>
          </div>
        </section>

        <section class="workspace hidden" id="workspace">
          <div class="viewer-frame">
            <img id="sceneImage" alt="Uploaded scene" />
            <div class="detection-layer" id="detectionLayer"></div>
            <div
              class="loading-overlay hidden"
              id="loadingOverlay"
              aria-live="polite"
            >
              <div class="radar" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div
      class="camera-sheet hidden"
      id="cameraSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="camera-stage">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div class="camera-controls">
          <button
            class="icon-button secondary"
            id="closeCameraButton"
            aria-label="Close camera"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4 6.4 5Z"
              />
            </svg>
          </button>
          <button
            class="capture-button"
            id="captureButton"
            aria-label="Capture image"
          >
            <span></span>
          </button>
        </div>
      </div>
    </div>

    <div
      class="teach-sheet hidden"
      id="teachSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="teach-card">
        <button
          class="icon-button secondary close-teach"
          id="closeTeachButton"
          aria-label="Close lesson"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4 6.4 5Z"
            />
          </svg>
        </button>
        <div class="teach-visual">
          <img id="lessonCrop" alt="Selected object" />
          <div class="mouth-orb" id="mouthOrb" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="beat-row" id="beatRow" aria-hidden="true"></div>
        <div class="lesson-controls">
          <button class="lesson-button" id="speakButton" aria-label="Hear word">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M5 9v6h4l5 4V5L9 9H5Zm11.5 3a4.5 4.5 0 0 0-2.2-3.9v7.8a4.5 4.5 0 0 0 2.2-3.9Zm0-8v2.2a8 8 0 0 1 0 11.6V20a10 10 0 0 0 0-16Z"
              />
            </svg>
          </button>
          <button
            class="lesson-button"
            id="slowSpeakButton"
            aria-label="Hear slowly"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 12a8 8 0 1 0 8-8v2a6 6 0 1 1-6 6H4Zm9-4v5l4 2 .8-1.8-2.8-1.4V8h-2Z"
              />
            </svg>
          </button>
          <button
            class="lesson-button"
            id="beatsButton"
            aria-label="Hear sounds in parts"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 18h2V8H5v10Zm6 0h2V5h-2v13Zm6 0h2v-8h-2v8Z" />
            </svg>
          </button>
          <button
            class="lesson-button"
            id="recordButton"
            aria-label="Record your voice"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Zm-1 2.9V20H8v2h8v-2h-3v-2.1a6 6 0 0 0 5-5.9h-2a4 4 0 0 1-8 0H6a6 6 0 0 0 5 5.9Z"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <input
      id="uploadInput"
      type="file"
      accept="image/*"
      class="hidden-input"
      aria-hidden="true"
    />

    <canvas id="captureCanvas" class="hidden-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
