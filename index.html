<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Learner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI4Good</p>
          <h1>Object Learner</h1>
        </div>
      </header>

      <main class="stage">
        <section
          class="empty-state"
          id="emptyState"
          aria-label="Choose image source"
        >
          <div class="empty-copy">
            <h2>Add a photo to start</h2>
            <p>
              Take a picture or upload one. Then tap any object box to hear and
              practice the word.
            </p>
          </div>
          <div class="action-row">
            <button class="primary-button" id="cameraButton" type="button">
              Take Photo
            </button>
            <button class="secondary-button" id="uploadButton" type="button">
              Upload Photo
            </button>
          </div>

          <div class="default-images-section">
            <p class="eyebrow" style="margin-top: 2rem; margin-bottom: 1rem;">Or try a sample photo</p>
            <div class="default-images-grid" id="defaultImagesGrid">
            </div>
          </div>
        </section>

        <section class="workspace hidden" id="workspace">
          <div class="workspace-toolbar" aria-label="Image actions">
            <button class="secondary-button" id="replaceCameraButton" type="button">
              Use Camera
            </button>
            <button class="secondary-button" id="replaceUploadButton" type="button">
              Upload New Photo
            </button>
            <button class="secondary-button" id="resetButton" type="button">
              Start Over
            </button>
          </div>
          <div class="viewer-frame">
            <img id="sceneImage" alt="Uploaded scene" />
            <div class="detection-layer" id="detectionLayer"></div>
            <div
              class="loading-overlay hidden"
              id="loadingOverlay"
              aria-live="polite"
            >
              <p>Finding objects...</p>
            </div>
          </div>
          <p class="workspace-hint" id="workspaceHint">
            Tap an object box to open the lesson.
          </p>
        </section>
      </main>
    </div>

    <div
      class="camera-sheet hidden"
      id="cameraSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="camera-stage">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div class="camera-controls">
          <button class="secondary-button" id="closeCameraButton" type="button">
            Cancel
          </button>
          <button class="primary-button" id="captureButton" type="button">
            Capture
          </button>
        </div>
      </div>
    </div>

    <div
      class="teach-sheet hidden"
      id="teachSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="teach-card">
        <button
          class="secondary-button close-teach"
          id="closeTeachButton"
          type="button"
        >
          Close
        </button>
        <div class="lesson-header">
          <p class="eyebrow">Lesson</p>
          <h2 id="lessonTitle">Object</h2>
          <p id="lessonDescription">Choose an action below.</p>
        </div>
        <div class="teach-visual">
          <img id="lessonCrop" alt="Selected object" />
        </div>
        <div class="beat-row" id="beatRow" aria-hidden="true"></div>
        <div class="lesson-controls">
          <button class="lesson-button" id="speakButton" type="button">
            <strong>Hear Word</strong>
            <span>Play at normal speed</span>
          </button>
          <button class="lesson-button" id="slowSpeakButton" type="button">
            <strong>Hear Slowly</strong>
            <span>Play a slower version</span>
          </button>
          <button class="lesson-button" id="beatsButton" type="button">
            <strong>Sound It Out</strong>
            <span>Hear each beat, then the full word</span>
          </button>
          <button class="lesson-button" id="recordButton" type="button">
            <strong>Record Myself</strong>
            <span>Record and play back your voice</span>
          </button>
        </div>
      </div>
    </div>

    <input
      id="uploadInput"
      type="file"
      accept="image/*"
      class="hidden-input"
      aria-hidden="true"
    />

    <canvas id="captureCanvas" class="hidden-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
