<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Learner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI4Good</p>
          <h1>Object Learner</h1>
        </div>
      </header>

      <main class="stage">
        <section
          class="empty-state"
          id="emptyState"
          aria-label="Choose image source"
        >
          <div class="empty-copy">
            <h2>Add a photo to start</h2>
            <p>
              Take a picture or upload one. Then tap any object box to hear and
              practice the word.
            </p>
          </div>
          <div class="action-row">
            <button class="primary-button" id="cameraButton" type="button">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M8.5 6.5 10 4h4l1.5 2.5H19A2.5 2.5 0 0 1 21.5 9v8A2.5 2.5 0 0 1 19 19.5H5A2.5 2.5 0 0 1 2.5 17V9A2.5 2.5 0 0 1 5 6.5h3.5Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                  <circle
                    cx="12"
                    cy="13"
                    r="3.25"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                </svg>
              </span>
              <span>Take Photo</span>
            </button>
            <button class="secondary-button" id="uploadButton" type="button">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 15.5V6.75"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="m8.75 10 3.25-3.25L15.25 10"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="M5.5 16.5v1A2 2 0 0 0 7.5 19.5h9a2 2 0 0 0 2-2v-1"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.8"
                  />
                </svg>
              </span>
              <span>Upload Photo</span>
            </button>
          </div>
        </section>

        <section class="workspace hidden" id="workspace">
          <div class="workspace-toolbar" aria-label="Image actions">
            <button class="secondary-button" id="replaceCameraButton" type="button">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M8.5 6.5 10 4h4l1.5 2.5H19A2.5 2.5 0 0 1 21.5 9v8A2.5 2.5 0 0 1 19 19.5H5A2.5 2.5 0 0 1 2.5 17V9A2.5 2.5 0 0 1 5 6.5h3.5Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                  <circle
                    cx="12"
                    cy="13"
                    r="3.25"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                </svg>
              </span>
              <span>Use Camera</span>
            </button>
            <button class="secondary-button" id="replaceUploadButton" type="button">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M12 15.5V6.75"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="m8.75 10 3.25-3.25L15.25 10"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="M5.5 16.5v1A2 2 0 0 0 7.5 19.5h9a2 2 0 0 0 2-2v-1"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.8"
                  />
                </svg>
              </span>
              <span>Upload New Photo</span>
            </button>
            <button class="secondary-button" id="resetButton" type="button">
              <span aria-hidden="true">↺</span>
              <span>Start Over</span>
            </button>
          </div>
          <div class="viewer-frame">
            <img id="sceneImage" alt="Uploaded scene" />
            <div class="detection-layer" id="detectionLayer"></div>
            <div
              class="loading-overlay hidden"
              id="loadingOverlay"
              aria-live="polite"
            >
              <p>Finding objects...</p>
            </div>
          </div>
          <p class="workspace-hint" id="workspaceHint">
            Tap an object box to open the lesson.
          </p>
        </section>
      </main>
    </div>

    <div
      class="camera-sheet hidden"
      id="cameraSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="camera-stage">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div class="camera-controls">
          <button class="secondary-button" id="closeCameraButton" type="button">
            Cancel
          </button>
          <button class="primary-button" id="captureButton" type="button">
            Capture
          </button>
        </div>
      </div>
    </div>

    <div
      class="teach-sheet hidden"
      id="teachSheet"
      aria-modal="true"
      role="dialog"
    >
      <div class="teach-card">
        <button
          class="secondary-button close-teach"
          id="closeTeachButton"
          type="button"
        >
          <span aria-hidden="true">✖</span>
          <span>Close</span>
        </button>
        <div class="lesson-header">
          <p class="eyebrow">Lesson</p>
          <h2 id="lessonTitle">Object</h2>
          <p id="lessonDescription">Choose an action below.</p>
        </div>
        <div class="teach-visual">
          <img id="lessonCrop" alt="Selected object" />
        </div>
        <div class="beat-row" id="beatRow" aria-hidden="true"></div>
        <div class="lesson-controls">
          <button class="lesson-button" id="speakButton" type="button">
            <strong><span aria-hidden="true">👂</span> Hear Word</strong>
            <span>Play at normal speed</span>
          </button>
          <button class="lesson-button" id="slowSpeakButton" type="button">
            <strong><span aria-hidden="true">🐢</span> Hear Slowly</strong>
            <span>Play a slower version</span>
          </button>
          <button class="lesson-button" id="beatsButton" type="button">
            <strong><span aria-hidden="true">🐢</span> Sound It Out</strong>
            <span>Hear each beat, then the full word</span>
          </button>
          <button class="lesson-button" id="recordButton" type="button">
            <strong><span aria-hidden="true">🎤</span> Check My Pronunciation</strong>
            <span>Say the word and get instant feedback</span>
          </button>
        </div>
      </div>
    </div>

    <input
      id="uploadInput"
      type="file"
      accept="image/*"
      class="hidden-input"
      aria-hidden="true"
    />

    <canvas id="captureCanvas" class="hidden-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
